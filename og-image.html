<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0">
    <title>Leader Leap Assessment Tool - Open Graph Image</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            width: 1200px;
            height: 630px;
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 0 40px;
        }
        .logo {
            width: 420px;
            height: auto;
            margin-top: 48px;
            margin-bottom: 36px;
            display: block;
            object-fit: contain;
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            font-weight: 700;
            color: #2F564D;
            margin-bottom: 18px;
            text-align: center;
        }
        .subtitle {
            font-size: 28px;
            font-weight: 400;
            color: #64748b;
            margin-bottom: 44px;
            text-align: center;
            max-width: 800px;
        }
        .features {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 22px;
            margin-bottom: 60px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            font-size: 26px;
            color: #2F564D;
            font-weight: 600;
            gap: 18px;
            background: none;
            border: none;
            padding: 0;
        }
        .feature-icon {
            font-size: 32px;
            margin-right: 8px;
        }
        .domain {
            margin-top: auto;
            font-size: 26px;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 0.5px;
            text-align: center;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/encouragercoachinglogo.png" alt="Encourager Coaching Logo" class="logo">
        <div class="title">Leader Leap Assessment Tool</div>
        <div class="subtitle">Identify and close the gaps between your current leadership competencies and where you want to be.</div>
        <div class="features">
            <div class="feature-item"><span class="feature-icon">🏆</span>10 Key Leadership Competencies</div>
            <div class="feature-item"><span class="feature-icon">📄</span>Downloadable Report</div>
            <div class="feature-item"><span class="feature-icon">💸</span>Free to Use</div>
        </div>
        <div class="domain">leader-leap.com</div>
    </div>

</html>
